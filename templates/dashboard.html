{% extends "base.html" %}
{% block title %}Literature Search — ResearchAI{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title"><i class="bi bi-search me-2 accent"></i>Literature Search</h1>
  <p class="page-subtitle">Search arXiv and Semantic Scholar simultaneously. Save papers to your library.</p>
</div>

<!-- Search bar -->
<div class="search-bar-wrapper">
  <div class="input-group search-input-group">
    <span class="input-group-text search-prefix"><i class="bi bi-search"></i></span>
    <input type="text" class="form-control search-main-input" id="searchQuery"
           placeholder="e.g. transformer attention mechanisms, protein folding…" />
    <button class="btn btn-primary btn-search" id="searchBtn">
      <span id="searchBtnLabel">Search</span>
      <span id="searchSpinner" class="spinner-border spinner-border-sm ms-1 d-none"></span>
    </button>
  </div>
  <div class="search-filters mt-2 d-flex gap-3 flex-wrap align-items-center">
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="checkbox" id="srcArxiv" checked />
      <label class="form-check-label" for="srcArxiv"><i class="bi bi-file-earmark-pdf me-1"></i>arXiv</label>
    </div>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="checkbox" id="srcSS" checked />
      <label class="form-check-label" for="srcSS"><i class="bi bi-diagram-3 me-1"></i>Semantic Scholar</label>
    </div>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <label class="text-muted small">Max results:</label>
      <select class="form-select form-select-sm" id="maxResults" style="width:80px">
        <option value="5">5</option>
        <option value="8" selected>8</option>
        <option value="15">15</option>
        <option value="20">20</option>
      </select>
    </div>
  </div>
</div>

<!-- Results area -->
<div id="searchResults" class="mt-4"></div>

<!-- Summary modal -->
<div class="modal fade" id="summaryModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content modal-custom">
      <div class="modal-header">
        <h5 class="modal-title" id="summaryModalTitle">Summary</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="summaryModalBody">
        <div class="text-center py-4">
          <div class="spinner-border text-primary"></div>
          <p class="mt-2 text-muted">Summarizing with Granite…</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^\s*[-•]\s+(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function buildPaperCard(paper, index) {
  const authors = (paper.authors || []).slice(0, 3).map(escapeHtml).join(', ');
  const moreAuthors = paper.authors && paper.authors.length > 3 ? ` +${paper.authors.length - 3} more` : '';
  const badgeColor = paper.source === 'arxiv' ? 'badge-arxiv' : 'badge-ss';
  const badgeLabel = paper.source === 'arxiv' ? 'arXiv' : 'S2';
  const cite = paper.citation_count != null ? `<span class="meta-chip"><i class="bi bi-quote me-1"></i>${paper.citation_count} citations</span>` : '';
  const abstract = escapeHtml((paper.abstract || '').substring(0, 300));

  return `
  <div class="paper-card" id="paper-${index}">
    <div class="paper-card-header">
      <span class="source-badge ${badgeColor}">${badgeLabel}</span>
      ${paper.year ? `<span class="meta-chip"><i class="bi bi-calendar3 me-1"></i>${paper.year}</span>` : ''}
      ${cite}
    </div>
    <h5 class="paper-title">
      ${paper.url ? `<a href="${escapeHtml(paper.url)}" target="_blank" rel="noopener">${escapeHtml(paper.title)}</a>` : escapeHtml(paper.title)}
    </h5>
    <p class="paper-authors">${authors}${moreAuthors}</p>
    <p class="paper-abstract">${abstract}${paper.abstract && paper.abstract.length > 300 ? '…' : ''}</p>
    <div class="paper-actions">
      <button class="btn btn-sm btn-save-paper" onclick="savePaper(${index})">
        <i class="bi bi-bookmark-plus me-1"></i>Save to Library
      </button>
      <button class="btn btn-sm btn-summarize-paper" onclick="summarizePaper(${index})">
        <i class="bi bi-magic me-1"></i>Summarize
      </button>
      ${paper.pdf_url ? `<a class="btn btn-sm btn-pdf" href="${escapeHtml(paper.pdf_url)}" target="_blank"><i class="bi bi-file-earmark-pdf me-1"></i>PDF</a>` : ''}
    </div>
  </div>`;
}

let currentPapers = [];

async function doSearch() {
  const query = document.getElementById('searchQuery').value.trim();
  if (!query) { showToast('Please enter a search query', 'warning'); return; }

  const sources = [];
  if (document.getElementById('srcArxiv').checked) sources.push('arxiv');
  if (document.getElementById('srcSS').checked) sources.push('semantic_scholar');
  if (!sources.length) { showToast('Select at least one source', 'warning'); return; }

  const maxResults = parseInt(document.getElementById('maxResults').value);

  document.getElementById('searchBtn').disabled = true;
  document.getElementById('searchSpinner').classList.remove('d-none');
  document.getElementById('searchBtnLabel').textContent = 'Searching…';

  const resultsDiv = document.getElementById('searchResults');
  resultsDiv.innerHTML = `<div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Searching ${sources.join(' & ')}…</p></div>`;

  try {
    const resp = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ query, sources, max_results: maxResults }),
    });
    const data = await resp.json();
    currentPapers = data.papers || [];

    if (currentPapers.length === 0) {
      resultsDiv.innerHTML = `<div class="empty-state"><i class="bi bi-search fs-2 text-muted"></i><p class="mt-2 text-muted">No papers found for "<strong>${escapeHtml(query)}</strong>". Try different keywords.</p></div>`;
    } else {
      resultsDiv.innerHTML = `<div class="results-header mb-3"><span class="results-count">${currentPapers.length} papers found</span> for "<strong>${escapeHtml(query)}</strong>"</div>` +
        currentPapers.map((p, i) => buildPaperCard(p, i)).join('');
    }
  } catch (e) {
    resultsDiv.innerHTML = '<div class="alert alert-danger">Search failed. Please try again.</div>';
  }

  document.getElementById('searchBtn').disabled = false;
  document.getElementById('searchSpinner').classList.add('d-none');
  document.getElementById('searchBtnLabel').textContent = 'Search';
}

async function savePaper(idx) {
  const paper = currentPapers[idx];
  if (!paper) return;
  try {
    const resp = await fetch('/api/library', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(paper),
    });
    const data = await resp.json();
    if (data.saved) {
      showToast(`"${paper.title.substring(0,50)}…" saved to library!`, 'success');
      const btn = document.querySelector(`#paper-${idx} .btn-save-paper`);
      if (btn) { btn.innerHTML = '<i class="bi bi-bookmark-check-fill me-1"></i>Saved'; btn.disabled = true; }
    } else {
      showToast('Paper already in library.', 'info');
    }
  } catch (e) {
    showToast('Failed to save paper.', 'danger');
  }
}

async function summarizePaper(idx) {
  const paper = currentPapers[idx];
  if (!paper) return;
  const modal = new bootstrap.Modal(document.getElementById('summaryModal'));
  document.getElementById('summaryModalTitle').textContent = paper.title.substring(0, 80);
  document.getElementById('summaryModalBody').innerHTML = `<div class="text-center py-4"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Summarizing with Granite…</p></div>`;
  modal.show();
  try {
    const resp = await fetch('/api/summarize', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text: paper.abstract, title: paper.title, authors: paper.authors, year: paper.year }),
    });
    const data = await resp.json();
    document.getElementById('summaryModalBody').innerHTML = `<div class="summary-content"><p>${renderMarkdown(escapeHtml(data.summary))}</p></div>`;
  } catch (e) {
    document.getElementById('summaryModalBody').innerHTML = '<div class="alert alert-danger">Summarization failed.</div>';
  }
}

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchQuery').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
{% endblock %}
