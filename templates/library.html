{% extends "base.html" %}
{% block title %}Reference Library — ResearchAI{% endblock %}

{% block content %}
<div class="page-header d-flex align-items-center justify-content-between flex-wrap gap-2">
  <div>
    <h1 class="page-title"><i class="bi bi-bookmark-fill me-2 accent"></i>Reference Library</h1>
    <p class="page-subtitle">Manage, tag, and export your saved research papers.</p>
  </div>
  <div class="d-flex gap-2">
    <a href="/api/library/export/bibtex" class="btn btn-outline-primary btn-sm" download="references.bib">
      <i class="bi bi-download me-1"></i>Export BibTeX
    </a>
    <button class="btn btn-outline-secondary btn-sm" onclick="loadLibrary()">
      <i class="bi bi-arrow-clockwise me-1"></i>Refresh
    </button>
  </div>
</div>

<!-- Filter bar -->
<div class="filter-bar mb-4">
  <div class="input-group" style="max-width:300px">
    <span class="input-group-text"><i class="bi bi-tag"></i></span>
    <input type="text" class="form-control form-control-sm" id="filterTag" placeholder="Filter by tag…" />
  </div>
  <div class="input-group" style="max-width:300px">
    <span class="input-group-text"><i class="bi bi-folder2"></i></span>
    <input type="text" class="form-control form-control-sm" id="filterProject" placeholder="Filter by project…" />
  </div>
  <button class="btn btn-sm btn-primary" onclick="loadLibrary()">
    <i class="bi bi-funnel me-1"></i>Filter
  </button>
</div>

<!-- Library list -->
<div id="libraryContent">
  <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
</div>

<!-- Citations export modal -->
<div class="modal fade" id="citationModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content modal-custom">
      <div class="modal-header">
        <h5 class="modal-title">Export Citations</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3 d-flex gap-2 flex-wrap">
          <button class="btn btn-sm btn-outline-primary" onclick="loadCitations('APA')">APA</button>
          <button class="btn btn-sm btn-outline-primary" onclick="loadCitations('MLA')">MLA</button>
          <button class="btn btn-sm btn-outline-primary" onclick="loadCitations('IEEE')">IEEE</button>
          <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="copyText()">
            <i class="bi bi-clipboard me-1"></i>Copy All
          </button>
        </div>
        <pre id="citationOutput" class="code-block">Select a style above…</pre>
      </div>
    </div>
  </div>
</div>

<!-- Edit paper modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content modal-custom">
      <div class="modal-header">
        <h5 class="modal-title">Edit Paper Metadata</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editPaperId" />
        <div class="mb-3">
          <label class="form-label">Project</label>
          <input type="text" class="form-control form-control-sm" id="editProject" placeholder="e.g. My PhD Chapter 2" />
        </div>
        <div class="mb-3">
          <label class="form-label">Tags <span class="text-muted small">(comma-separated)</span></label>
          <input type="text" class="form-control form-control-sm" id="editTags" placeholder="e.g. nlp, transformers, survey" />
        </div>
        <div class="mb-3">
          <label class="form-label">Notes</label>
          <textarea class="form-control form-control-sm" id="editNotes" rows="3" placeholder="Personal notes…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script>
let allPapers = [];

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildLibraryCard(p) {
  const authors = (p.authors || []).slice(0,3).map(escapeHtml).join(', ');
  const tags = (p.tags || []).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('');
  const project = p.project ? `<span class="meta-chip"><i class="bi bi-folder2 me-1"></i>${escapeHtml(p.project)}</span>` : '';
  const ragBadge = p.ingested_to_rag ? '<span class="rag-badge"><i class="bi bi-database-fill-check me-1"></i>In RAG</span>' : '';

  return `
  <div class="library-card" id="lib-${p.id}">
    <div class="library-card-header">
      <div class="d-flex align-items-center gap-2 flex-wrap">
        ${p.year ? `<span class="meta-chip"><i class="bi bi-calendar3 me-1"></i>${p.year}</span>` : ''}
        ${project}
        ${ragBadge}
      </div>
      <div class="d-flex gap-1">
        <button class="btn btn-icon" title="Edit" onclick="openEdit(${p.id})"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-icon text-danger" title="Delete" onclick="deletePaper(${p.id})"><i class="bi bi-trash"></i></button>
      </div>
    </div>
    <h5 class="paper-title mb-1">
      ${p.url ? `<a href="${escapeHtml(p.url)}" target="_blank">${escapeHtml(p.title)}</a>` : escapeHtml(p.title)}
    </h5>
    <p class="paper-authors mb-1">${authors}</p>
    ${p.abstract ? `<p class="paper-abstract">${escapeHtml(p.abstract.substring(0,250))}…</p>` : ''}
    <div class="d-flex align-items-center gap-2 flex-wrap mt-2">
      ${tags}
      ${p.doi ? `<a class="meta-chip-link" href="https://doi.org/${escapeHtml(p.doi)}" target="_blank"><i class="bi bi-link-45deg me-1"></i>DOI</a>` : ''}
    </div>
    ${p.notes ? `<div class="paper-notes mt-2"><i class="bi bi-sticky-fill me-1"></i>${escapeHtml(p.notes)}</div>` : ''}
  </div>`;
}

async function loadLibrary() {
  const tag = document.getElementById('filterTag').value.trim();
  const project = document.getElementById('filterProject').value.trim();
  const params = new URLSearchParams();
  if (tag) params.set('tag', tag);
  if (project) params.set('project', project);

  document.getElementById('libraryContent').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

  try {
    const resp = await fetch('/api/library?' + params.toString());
    const data = await resp.json();
    allPapers = data.papers || [];
    if (allPapers.length === 0) {
      document.getElementById('libraryContent').innerHTML = `
        <div class="empty-state">
          <i class="bi bi-bookmark fs-2 text-muted"></i>
          <p class="mt-2 text-muted">No papers saved yet. <a href="/dashboard">Search for papers</a> to get started.</p>
        </div>`;
    } else {
      document.getElementById('libraryContent').innerHTML =
        `<div class="results-header mb-3">${allPapers.length} paper${allPapers.length !== 1 ? 's' : ''} saved</div>` +
        allPapers.map(buildLibraryCard).join('');
    }
  } catch(e) {
    document.getElementById('libraryContent').innerHTML = '<div class="alert alert-danger">Failed to load library.</div>';
  }
}

function openEdit(id) {
  const p = allPapers.find(x => x.id === id);
  if (!p) return;
  document.getElementById('editPaperId').value = id;
  document.getElementById('editProject').value = p.project || '';
  document.getElementById('editTags').value = (p.tags || []).join(', ');
  document.getElementById('editNotes').value = p.notes || '';
  new bootstrap.Modal(document.getElementById('editModal')).show();
}

async function saveEdit() {
  const id = document.getElementById('editPaperId').value;
  const body = {
    project: document.getElementById('editProject').value.trim(),
    tags: document.getElementById('editTags').value.trim(),
    notes: document.getElementById('editNotes').value.trim(),
  };
  await fetch(`/api/library/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
  showToast('Paper updated!', 'success');
  loadLibrary();
}

async function deletePaper(id) {
  if (!confirm('Remove this paper from your library?')) return;
  await fetch(`/api/library/${id}`, { method: 'DELETE' });
  showToast('Paper removed.', 'info');
  loadLibrary();
}

async function loadCitations(style) {
  if (allPapers.length === 0) { showToast('No papers in library', 'warning'); return; }
  document.getElementById('citationOutput').textContent = 'Loading…';
  const resp = await fetch('/api/citations', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ papers: allPapers, style, include_bibtex: style === 'BIBTEX' }),
  });
  const data = await resp.json();
  if (style === 'BIBTEX') {
    document.getElementById('citationOutput').textContent = data.bibtex;
  } else {
    document.getElementById('citationOutput').textContent = (data.citations || []).join('\n\n');
  }
}

document.getElementById('libraryContent').parentElement.querySelectorAll('[data-bs-toggle]');
document.querySelector('[onclick*="loadCitations"]');

// Show citation modal via button
document.addEventListener('DOMContentLoaded', () => {
  const exportBtn = document.createElement('button');
  exportBtn.className = 'btn btn-outline-secondary btn-sm';
  exportBtn.innerHTML = '<i class="bi bi-list-ol me-1"></i>View Citations';
  exportBtn.setAttribute('data-bs-toggle', 'modal');
  exportBtn.setAttribute('data-bs-target', '#citationModal');
  document.querySelector('.page-header .d-flex').prepend(exportBtn);
});

function copyText() {
  const text = document.getElementById('citationOutput').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('Copied!', 'success'));
}

loadLibrary();
</script>
{% endblock %}
